# CodeRabbit config for twodev stacked Go rewrite PRs.
# Stacked PRs target go/* branches, not main. Without base_branches, every
# PR after #1 gets "Review skipped" noise.
reviews:
  auto_review:
    base_branches:
      - "go/.*"
  path_filters:
    - "!terminals/**"
    - "!scripts/**"
    - "!**/*.sum"